# --------------------------------------------------
# Namespace
# --------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: jerney

---
# --------------------------------------------------
# Database Secret
# --------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: jerney-db-secret
  namespace: jerney
type: Opaque
data:
  POSTGRES_USER: amVybmV5X3VzZXI=
  POSTGRES_PASSWORD: amVybmV5X3Bhc3NfMjAyNg==
  POSTGRES_DB: amVybmV5X2Ri

---
# --------------------------------------------------
# StorageClass
# --------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: jerney-ebs-sc
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer

---
# --------------------------------------------------
# PVC
# --------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jerney-db-pvc
  namespace: jerney
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: jerney-ebs-sc
  resources:
    requests:
      storage: 10Gi

---
# --------------------------------------------------
# DB Deployment
# --------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-db
  namespace: jerney
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jerney-db
  template:
    metadata:
      labels:
        app: jerney-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: jerney-db-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: jerney-db-pvc

---
# --------------------------------------------------
# DB Service (ClusterIP)
# --------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: jerney-db
  namespace: jerney
spec:
  selector:
    app: jerney-db
  ports:
    - port: 5432
      targetPort: 5432

---
# --------------------------------------------------
# Backend Deployment
# --------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-backend
  namespace: jerney
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jerney-backend
  template:
    metadata:
      labels:
        app: jerney-backend
    spec:
      containers:
        - name: backend
          image: vishnukrajan007/backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: jerney-db
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: jerney-db-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jerney-db-secret
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: jerney-db-secret
                  key: POSTGRES_DB

---
# --------------------------------------------------
# Backend Service (LoadBalancer)
# --------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: jerney-backend
  namespace: jerney
spec:
  type: LoadBalancer
  selector:
    app: jerney-backend
  ports:
    - port: 80
      targetPort: 5000

---
# --------------------------------------------------
# Frontend Deployment
# --------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-frontend
  namespace: jerney
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jerney-frontend
  template:
    metadata:
      labels:
        app: jerney-frontend
    spec:
      containers:
        - name: frontend
          image: vishnukrajan007/frontend:latest
          ports:
            - containerPort: 8080

---
# --------------------------------------------------
# Frontend Service (LoadBalancer)
# --------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: jerney-frontend
  namespace: jerney
spec:
  type: LoadBalancer
  selector:
    app: jerney-frontend
  ports:
    - port: 80
      targetPort: 8080
